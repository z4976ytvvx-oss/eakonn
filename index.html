<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#fff;
  color:#111827;
  font-family:system-ui,-apple-system,"Segoe UI","Yu Gothic",Meiryo,sans-serif;
  padding-bottom:88px;
}
img{width:100%;display:block}
a{text-decoration:none;color:inherit}
.lp{max-width:1120px;margin:auto;background:#fff}

/* ===== ヘッダー ===== */
.header{
  position:sticky;
  top:0;
  z-index:999;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}
.header-inner{
  max-width:1120px;
  margin:auto;
  padding:9px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.logo{display:flex;align-items:center;gap:8px;line-height:1.1}
.logo-mark{
  width:28px;height:28px;border-radius:8px;
  background:#073b86;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;
}
.logo-main{display:block;font-size:15px;font-weight:900;color:#073b86}
.logo-sub{display:block;font-size:10px;color:#667085;font-weight:700}

/* 🔥CTA強化（上書き） */
.header-cta{display:flex;gap:8px}
.header-cta a{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-width:110px;
  min-height:54px;
  padding:10px 12px;
  border-radius:14px;
  color:#fff;
  font-weight:900;
  font-size:14px;
  text-align:center;
  box-shadow:0 6px 16px rgba(0,0,0,.25);
}
.btn-phone{background:linear-gradient(135deg,#ff3b3b,#d71920)}
.btn-line{background:linear-gradient(135deg,#06c755,#03a94d)}

/* ===== ヒーロー ===== */
.hero{position:relative;background:#000}

/* 🔥モモ左固定（被り防止） */
.hero-copy{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  bottom:auto;
  background:rgba(0,0,0,.65);
  color:#fff;
  border-radius:14px;
  padding:10px 14px;
  max-width:240px;
}
.hero-copy h1{
  margin:0;
  font-size:28px;
  line-height:1.2;
  font-weight:950;
}
.hero-copy p{
  margin:4px 0 0;
  color:#ffe082;
  font-size:13px;
  font-weight:900;
}

/* ===== CTA画像（ズレ防止） ===== */
.cta-top,.final-cta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:10px;
  background:#fff;
}
.cta-top a,.final-cta a{
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
}
.cta-top img,.final-cta img{
  width:100%;
  height:auto;
  object-fit:contain;
}

/* ===== 既存そのまま ===== */
.trust-bar{
  background:#073b86;
  color:#fff;
  text-align:center;
  font-weight:900;
  padding:10px 8px;
  font-size:14px;
}

.notice{
  background:#fff2b8;
  color:#111;
  font-weight:900;
  text-align:center;
  padding:12px 10px;
  border-top:1px solid #f4d34b;
  border-bottom:1px solid #f4d34b;
  font-size:14px;
  line-height:1.5;
}

.block{max-width:900px;margin:18px auto;padding:0 14px}
.block h2{margin:0 0 10px;font-size:22px;color:#073b86}
.block p{margin:0;font-size:14px;line-height:1.8}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:900px;margin:18px auto;padding:0 10px}
.card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:14px 10px;text-align:center;font-weight:900;font-size:13px}
.card span{display:block;color:#d71920;font-size:20px}

.symptom-list{max-width:900px;margin:18px auto;padding:0 14px}
.symptom-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.symptom{border:1px solid #e5e7eb;border-radius:14px;padding:12px;background:#fff;font-weight:800}

.image-stack img{margin:0 auto 16px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08)}

.trust-box{background:#fff7e6;border:1px solid #ffd38a;border-radius:14px;padding:12px 14px;margin:4px 10px 16px}
.price-note{background:#eef6ff;border-left:5px solid #073b86;max-width:900px;margin:14px auto;padding:14px}
.mini-text{text-align:center;margin:12px}

.footer{background:#071425;color:#dbeafe;text-align:center;padding:22px 10px}

.fixed-cta{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:6px;
  background:#fff;
}
.fix-btn{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-radius:12px;
  padding:10px;
  color:#fff;
  font-weight:900;
}
.fix-btn.phone{background:#d71920}
.fix-btn.line{background:#06c755}
</style>
