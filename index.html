<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>松戸のエアコン修理｜誠和電気 エアコンレスキュー</title>
<meta name="description" content="松戸拠点のエアコン修理なら誠和電気。冷えない・水漏れ・異音・風が出ないなど電話・LINEでご相談ください。">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#fff;
  font-family:system-ui,-apple-system,"Segoe UI","Yu Gothic",Meiryo,sans-serif;
  padding-bottom:88px;
}
img{width:100%;display:block}
a{text-decoration:none;color:inherit}

.header{
  position:sticky;
  top:0;
  z-index:50;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}
.header-inner{
  max-width:1120px;
  margin:auto;
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  font-weight:900;
  color:#073b86;
}
.tel{
  font-weight:900;
  color:#d71920;
  font-size:20px;
}

.lp{
  max-width:1120px;
  margin:auto;
  background:#fff;
}

.hero img{
  border-radius:0;
}

.cta-top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:10px;
  background:#fff;
}
.cta-top a{
  overflow:hidden;
  border-radius:14px;
}
.cta-top img{
  height:105px;
  object-fit:cover;
  object-position:center;
}

.notice{
  background:#fff2b8;
  color:#111;
  font-weight:900;
  text-align:center;
  padding:12px 10px;
  border-top:1px solid #f4d34b;
  border-bottom:1px solid #f4d34b;
}

.image-stack{
  padding:18px 10px 8px;
}
.image-stack img{
  margin:0 auto 18px;
  border-radius:18px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.final-cta{
  padding:10px 10px 22px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.final-cta a{
  overflow:hidden;
  border-radius:14px;
}
.final-cta img{
  height:105px;
  object-fit:cover;
  object-position:center;
}

.footer{
  background:#071425;
  color:#dbeafe;
  text-align:center;
  padding:22px 10px;
  font-size:13px;
  line-height:1.7;
}

.fixed-cta{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:9999;
  background:rgba(255,255,255,.98);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  padding:4px;
  box-shadow:0 -4px 16px rgba(0,0,0,.18);
}
.fixed-cta a{
  overflow:hidden;
  border-radius:10px;
}
.fixed-cta img{
  height:76px;
  object-fit:cover;
  object-position:center;
}

@media(max-width:700px){
  .tel{font-size:16px}
  .cta-top img,
  .final-cta img{height:78px}
  .fixed-cta img{height:68px}
  .image-stack{padding:10px 6px}
  .image-stack img{border-radius:12px;margin-bottom:12px}
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">誠和電気｜松戸エアコン修理</div>
    <a class="tel" href="tel:0358794790">03-5879-4790</a>
  </div>
</header>

<main class="lp">

  <section class="hero">
    <img src="/hero-aircon.jpg" alt="誠和電気 エアコンレスキュー 松戸拠点">
  </section>

  <section class="cta-top">
    <a href="tel:0358794790">
      <img src="/cta-phone.png" alt="今すぐ電話する">
    </a>
    <a href="#">
      <img src="/cta-line.png" alt="LINEで相談する">
    </a>
  </section>

  <div class="notice">
    夏場は修理依頼が集中します。冷えない・水漏れ・異音は早めの相談がおすすめです。
  </div>

  <section class="image-stack">
    <img src="/price-aircon.jpg" alt="エアコン故障 料金表">
    <img src="/area-matsudo-kanto.jpg" alt="松戸拠点 関東一円対応">
    <img src="/flow.png" alt="作業実績">
    <img src="/review-customers.jpg" alt="お客様の声">
    <img src="/guarantee-1year-aircon.jpg" alt="修理後も安心の1年保証">
  </section>

  <section class="final-cta">
    <a href="tel:0358794790">
      <img src="/cta-phone.png" alt="今すぐ電話する">
    </a>
    <a href="#">
      <img src="/cta-line.png" alt="LINEで相談する">
    </a>
  </section>

</main>

<footer class="footer">
  誠和電気 エアコンレスキュー｜松戸拠点・関東一円対応<br>
  受付時間 9:00〜20:00｜電話 03-5879-4790
</footer>

<div class="fixed-cta">
  <a href="tel:0358794790">
    <img src="/cta-phone.png" alt="今すぐ電話する">
  </a>
  <a href="#">
    <img src="/cta-line.png" alt="LINEで相談する">
  </a>
</div>

</body>
</html>
