name: Update LP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update LP content
        run: |
          sed -i 's/review-simple.jpg/review-customers.jpg/g' index.html
          sed -i 's/松戸/松戸/g' index.html

      - name: Commit changes
        run: |
          git config user.name "lp-auto-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto LP update" || echo "No changes"
          git push
